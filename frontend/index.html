<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tianjiahui's Blog</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="fluid-bg">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="blob blob-4"></div>
    </div>

    <nav class="glass-nav">
      <div class="nav-content">
        <a href="/" class="logo" style="font-weight: 800;">Tianjiahui's Blog</a>

        <div class="nav-links">
          <a href="/" class="nav-link" data-link>首页</a>
          <a href="/archives" class="nav-link" data-link>归档</a>
          <a href="/about" class="nav-link" data-link>关于</a>
          <a href="/login" class="nav-link" id="nav-login-btn" data-link>管理</a>
        </div>

        <form id="search-form" class="search-form" onsubmit="handleSearchSubmit(event)">
          <input id="search-input" type="text" placeholder="搜索文章..." autocomplete="off" />
          <button type="submit" aria-label="搜索">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7" />
              <line x1="16.5" y1="16.5" x2="22" y2="22" />
            </svg>
          </button>
        </form>
      </div>
    </nav>

    <main id="app" class="glass-container" style="min-height: calc(100vh - 180px); padding-bottom: 20px;"></main>

    <footer
      class="global-footer"
      style="position: relative; z-index: 10; text-align: center; color: rgba(255,255,255,0.7); padding: 20px; font-size: 0.85rem; line-height: 1.8;"
    >
      <div style="margin-bottom: 8px;">
        <a
          rel="license"
          href="https://creativecommons.org/licenses/by/4.0/"
          target="_blank"
          style="color: inherit; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; opacity: 0.8; transition: opacity 0.3s;"
          onmouseover="this.style.opacity=1"
          onmouseout="this.style.opacity=0.8"
        >
          <svg style="width: 20px; height: 20px; margin-right: 6px; fill: currentColor;" viewBox="0 0 496 512" xmlns="http://www.w3.org/2000/svg"><path d="M245.83 214.87l-33.22 17.28c-9.43-19.58-25.24-19.93-27.46-19.93-22.13 0-33.22 14.61-33.22 43.84 0 23.57 9.21 43.84 33.22 43.84 14.45 0 27.65-8.68 30.58-20.26l31.62 16.51C238.13 325.07 210.84 334 184.66 334c-45.74 0-71.1-28.71-71.1-78.03 0-51.48 29.56-78.03 72.33-78.03 26.33 0 54.34 11.45 59.94 36.93zM464 256c0 114.87-93.13 208-208 208S48 370.87 48 256 141.13 48 256 48s208 93.13 208 208zm-22.12 0c0-102.66-83.22-185.88-185.88-185.88S70.12 153.34 70.12 256c0 102.66 83.22 185.88 185.88 185.88S441.88 358.66 441.88 256zM368.51 214.87l-33.22 17.28c-9.43-19.58-25.24-19.93-27.46-19.93-22.13 0-33.22 14.61-33.22 43.84 0 23.57 9.21 43.84 33.22 43.84 14.45 0 27.65-8.68 30.58-20.26l31.62 16.51C360.8 325.07 333.51 334 307.33 334c-45.74 0-71.1-28.71-71.1-78.03 0-51.48 29.56-78.03 72.33-78.03 26.33 0 54.34 11.45 59.94 36.93z" /></svg>
          CC BY 4.0 许可协议
        </a>
      </div>
      <div>Copyright © 2026 J&H. All Rights Reserved.</div>
      <div>小站已运行：<span id="runtime-counter">0 天 0 小时 0 分 0 秒</span></div>
    </footer>

    <div id="toast-container"></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
